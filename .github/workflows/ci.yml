name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: macos-latest   # macOS runner for Apple-Silicon-specific deps

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-ci-dummy
        run: uv run pytest --tb=short -q
